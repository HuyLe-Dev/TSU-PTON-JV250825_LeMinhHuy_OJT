spring.application.name=smart_cinema_booking_system

# Bật tính năng import file secret (application-secret.properties)
spring.profiles.include=secret
spring.datasource.url=jdbc:mysql://localhost:3306/smart_cinema_booking_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Bật Seeding Data trên máy local
app.seeder.enabled=true

# Giới hạn file upload (5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Thư mục lưu file vật lý
app.upload.dir=uploads/

# Cloudinary configuration (Secrets moved to application-secret.properties)
cloudinary.cloud-name=do9cajnqr

# JWT configuration
app.jwt.secret=SmartCinemaSecretKeyForJwtAuthentication2026
# Thời gian sống của token (ms). Mặc định: 86400000 = 1 ngày
app.jwt.expiration=86400000

# ===== PayPal Configuration =====
# Mode: sandbox hoặc live
paypal.mode=sandbox
# Secrets moved to application-secret.properties
# Base URL cho PayPal API
paypal.base-url=https://api-m.sandbox.paypal.com
# Currency (PayPal không hỗ trợ VND trực tiếp, dùng USD)
paypal.currency=USD
# Tỷ giá VND → USD (ước lượng, cập nhật theo thời gian thực nếu cần)
paypal.vnd-to-usd-rate=25000
# Thời gian giữ ghế tối đa khi chờ thanh toán PayPal (phút)
paypal.payment-timeout-minutes=15

# ===== Email Configuration =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Username and Password moved to application-secret.properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true