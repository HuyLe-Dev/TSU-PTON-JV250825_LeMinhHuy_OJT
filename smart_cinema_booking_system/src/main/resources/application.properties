spring.application.name=smart_cinema_booking_system
spring.datasource.url=jdbc:mysql://localhost:3306/smart_cinema_booking_system?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Giới hạn file upload (5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Thư mục lưu file vật lý
app.upload.dir=uploads/

# JWT configuration
app.jwt.secret=SmartCinemaSecretKeyForJwtAuthentication2026
# Thời gian sống của token (ms). Mặc định: 86400000 = 1 ngày
app.jwt.expiration=86400000