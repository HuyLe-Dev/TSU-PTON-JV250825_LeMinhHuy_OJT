<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Smart Cinema</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

  <!-- Logo -->
  <div class="auth-logo">
    <a th:href="@{/}">
      <img th:src="@{/images/logo.png}" alt="Logo">
      Smart Cinema
    </a>
  </div>

  <!-- Register Card -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Đăng ký tài khoản</h1>

      <!-- Error message -->
      <div th:if="${errorMessage}" class="alert-auth error">
        <i class="bx bx-error-circle"></i>
        <span th:text="${errorMessage}">Lỗi</span>
      </div>

      <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" novalidate>

        <div class="form-group">
          <label for="fullName">Họ và tên</label>
          <input type="text" id="fullName" th:field="*{fullName}"
            th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''" placeholder="Nhập họ và tên...">
          <span class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
        </div>

        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" th:field="*{username}"
            th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" placeholder="Từ 4 đến 50 ký tự...">
          <span class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="form-group">
          <label for="email">Địa chỉ Email</label>
          <input type="email" id="email" th:field="*{email}"
            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" placeholder="vi_du@gmail.com...">
          <span class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" th:field="*{password}"
            th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" placeholder="Tối thiểu 6 ký tự...">
          <i class="bx bx-show toggle-password" onclick="togglePass('password', this)"></i>
          <span class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
            th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
            placeholder="Nhập lại mật khẩu...">
          <i class="bx bx-show toggle-password" onclick="togglePass('confirmPassword', this)"></i>
          <span class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
            th:errors="*{confirmPassword}"></span>
        </div>

        <button type="submit" class="btn-auth-submit">TẠO TÀI KHOẢN</button>
      </form>

      <div class="auth-footer-text">
        Đã có tài khoản?
        <a th:href="@{/auth/login}">Đăng nhập tại đây</a>
      </div>

      <div class="auth-help">
        <a th:href="@{/}">← Về trang chủ</a>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="auth-bottom">
    <span>&copy; 2025 Smart Cinema</span>
    <a href="#">Điều khoản</a>
    <a href="#">Bảo mật</a>
    <a href="#">Trợ giúp</a>
  </div>

  <script>
    function togglePass(fieldId, icon) {
      var input = document.getElementById(fieldId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bx-show');
        icon.classList.add('bx-hide');
      } else {
        input.type = 'password';
        icon.classList.remove('bx-hide');
        icon.classList.add('bx-show');
      }
    }
  </script>
</body>

</html>
