<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Smart Cinema</title>
  <link rel="stylesheet" href="../../static/css/auth.css" th:href="@{/css/auth.css}">
  <link rel="icon" href="../../static/images/logo.png" th:href="@{/images/logo.png}" type="image/png">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

  <!-- Logo -->
  <div class="auth-logo">
    <a href="/" th:href="@{/}">
      <img src="../../static/images/logo.png" th:src="@{/images/logo.png}" alt="Logo">
      Smart Cinema
    </a>
  </div>

  <!-- Login Card -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Đăng nhập</h1>

      <!-- Success message (from register redirect) -->
      <div th:if="${successMessage}" class="alert-auth success" style="display:none" th:style="''">
        <i class="bx bx-check-circle"></i>
        <span th:text="${successMessage}">Thành công</span>
      </div>

      <!-- Error message -->
      <div th:if="${errorMessage}" class="alert-auth error" style="display:none" th:style="''">
        <i class="bx bx-error-circle"></i>
        <span th:text="${errorMessage}">Lỗi</span>
      </div>

      <form th:action="@{/auth/login}" th:object="${loginDTO}" method="post">

        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" th:field="*{username}" required
            th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" placeholder="Nhập tên đăng nhập...">
          <span class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" th:field="*{password}" required
            th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" placeholder="Nhập mật khẩu...">
          <i class="bx bx-show toggle-password" onclick="togglePass('password', this)"></i>
          <span class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <button type="submit" class="btn-auth-submit">ĐĂNG NHẬP</button>
      </form>

      <div class="auth-footer-text">
        Chưa có tài khoản?
        <a th:href="@{/auth/register}">Đăng ký ngay</a>
      </div>

      <div class="auth-help">
        <a th:href="@{/}">← Về trang chủ</a>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="auth-bottom">
    <span>&copy; 2026 Smart Cinema</span>
    <a href="#">Điều khoản</a>
    <a href="#">Bảo mật</a>
    <a href="#">Trợ giúp</a>
  </div>

  <script>
    function togglePass(fieldId, icon) {
      var input = document.getElementById(fieldId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bx-show');
        icon.classList.add('bx-hide');
      } else {
        input.type = 'password';
        icon.classList.remove('bx-hide');
        icon.classList.add('bx-show');
      }
    }
  </script>
</body>

</html>
