<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #141e30;
            background: -webkit-linear-gradient(to right, #243b55, #141e30);
            background: linear-gradient(to right, #243b55, #141e30);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .card-header {
            border-top-left-radius: 15px !important;
            border-top-right-radius: 15px !important;
        }
    </style>
</head>

<body class="d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg my-5">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0 fw-bold">SMART CINEMA</h4>
                        <small class="text-white-50">Vui lòng đăng nhập để tiếp tục</small>
                    </div>
                    <div class="card-body p-4">

                        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"
                            role="alert">
                            <span th:text="${successMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show"
                            role="alert">
                            <span th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form th:action="@{/auth/login}" th:object="${loginDTO}" method="post" novalidate>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên đăng nhập</label>
                                <input type="text" th:field="*{username}"
                                    th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                    class="form-control" placeholder="Nhập tên đăng nhập...">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                    th:errors="*{username}"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" th:field="*{password}"
                                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                    class="form-control" placeholder="Nhập mật khẩu...">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></div>
                            </div>

                            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold shadow-sm">ĐĂNG NHẬP</button>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-transparent border-0 pb-4">
                        <span class="text-muted">Chưa có tài khoản?</span>
                        <a th:href="@{/auth/register}" class="text-decoration-none fw-bold text-primary">Đăng ký
                            ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
