<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">SMART CINEMA</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}">Trang chủ</a>
                <a class="nav-link active" th:href="@{/profile}">Hồ sơ</a>
                <a class="nav-link text-warning" th:href="@{/auth/logout}">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <!-- Thông báo lỗi -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">Đổi mật khẩu</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/change-password}" th:object="${passwordDTO}" method="post" id="change-password-form">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu hiện tại <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{currentPassword}" required
                                       th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid' : ''"
                                       class="form-control" placeholder="Nhập mật khẩu hiện tại...">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu mới <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{newPassword}" required minlength="6"
                                       th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                                       class="form-control" placeholder="Tối thiểu 6 ký tự...">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{confirmPassword}" required minlength="6"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                       class="form-control" placeholder="Nhập lại mật khẩu mới...">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                            </div>

                            <div class="text-end">
                                <a th:href="@{/profile}" class="btn btn-secondary me-2">Hủy</a>
                                <button type="submit" class="btn btn-danger">Đổi mật khẩu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('change-password-form').addEventListener('submit', function(e) {
            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var confirmField = document.getElementById('confirmPassword');
            // Xóa lỗi cũ nếu có
            confirmField.classList.remove('is-invalid');
            var existingError = confirmField.parentNode.querySelector('.js-error');
            if (existingError) existingError.remove();

            if (newPassword !== confirmPassword) {
                e.preventDefault();
                confirmField.classList.add('is-invalid');
                var errorDiv = document.createElement('div');
                errorDiv.className = 'invalid-feedback js-error';
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Mật khẩu xác nhận không khớp với mật khẩu mới!';
                confirmField.parentNode.appendChild(errorDiv);
                confirmField.focus();
            }
        });
    </script>
</body>

</html>
