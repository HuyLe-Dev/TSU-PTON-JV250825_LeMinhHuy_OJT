<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa hồ sơ - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">SMART CINEMA</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}">Trang chủ</a>
                <a class="nav-link active" th:href="@{/profile}">Hồ sơ</a>
                <a class="nav-link text-warning" th:href="@{/auth/logout}">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <!-- Thông báo lỗi -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">Chỉnh sửa hồ sơ</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/edit}" th:object="${profileDTO}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{fullName}" required maxlength="100"
                                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                           class="form-control" placeholder="Nhập họ và tên...">
                                    <div class="invalid-feedback">Vui lòng nhập họ và tên.</div>
                                    <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                                    <input type="email" th:field="*{email}" required
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                           class="form-control" placeholder="email@example.com">
                                    <div class="invalid-feedback">Vui lòng nhập email.</div>
                                    <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <input type="text" th:field="*{phone}" maxlength="20"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                           class="form-control" placeholder="0123456789">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Giới tính</label>
                                    <select th:field="*{gender}" class="form-select">
                                        <option value="">-- Chọn giới tính --</option>
                                        <option th:each="g : ${genders}" th:value="${g}" th:text="${g.name() == 'MALE'} ? 'Nam' : (${g.name() == 'FEMALE'} ? 'Nữ' : 'Khác')">Gender</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Ngày sinh</label>
                                    <input type="date" th:field="*{dateOfBirth}"
                                           th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid' : ''"
                                           class="form-control">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Ảnh đại diện</label>
                                    <input type="file" name="avatarFile" accept="image/*"
                                           class="form-control">
                                    <div class="form-text">Chọn ảnh mới để thay đổi. Để trống nếu không muốn thay đổi.</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Địa chỉ</label>
                                <textarea th:field="*{address}" maxlength="255"
                                          th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''"
                                          class="form-control" rows="2" placeholder="Nhập địa chỉ..."></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                            </div>

                            <div class="text-end">
                                <a th:href="@{/profile}" class="btn btn-secondary me-2">Hủy</a>
                                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Bootstrap 5 client-side validation
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>
