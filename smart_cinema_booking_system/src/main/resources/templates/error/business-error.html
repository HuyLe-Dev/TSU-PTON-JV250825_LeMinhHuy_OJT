<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Lỗi nghiệp vụ - Smart Cinema</title>
  <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
  <style>
    body {
      background: #0a0a0f;
      padding: 0;
      margin: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
    }

    .container img {
      max-width: 300px;
      width: 60%;
      filter: hue-rotate(270deg) saturate(1.3);
    }

    .icon-warn {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 2rem;
      color: #e50914;
      font-weight: 900;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 1.1rem;
      color: #ff6b6b;
      font-weight: 500;
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto 8px;
      background: rgba(229, 9, 20, 0.08);
      border: 1px solid rgba(229, 9, 20, 0.3);
      border-radius: 8px;
      padding: 16px 24px;
    }

    h3 {
      font-size: 0.9rem;
      color: #808080;
      font-weight: 400;
      line-height: 1.6;
      max-width: 500px;
      margin: 12px auto 24px;
    }

    .btn-back {
      display: inline-block;
      background: #e50914;
      padding: 12px 32px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      background: #ff1a25;
      transform: scale(1.03);
    }

    .btn-home {
      display: inline-block;
      background: transparent;
      border: 1px solid #555;
      padding: 12px 32px;
      color: #b3b3b3;
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      margin-left: 12px;
      transition: all 0.2s ease;
    }

    .btn-home:hover {
      border-color: #fff;
      color: #fff;
    }

    .brand {
      margin-top: 40px;
      color: #555;
      font-size: 0.85rem;
    }

    .brand a {
      color: #e50914;
      text-decoration: none;
      font-weight: 700;
    }

    @media screen and (max-width: 500px) {
      .container img {
        width: 50%;
      }

      h1 {
        font-size: 1.6rem;
      }

      .btn-home {
        margin-left: 0;
        margin-top: 12px;
        display: block;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="font-size: 6rem; margin-bottom: 16px;">⚠️</div>
    <h1>Không thể thực hiện</h1>
    <p class="error-msg" th:text="${errorMessage}">Đã xảy ra lỗi nghiệp vụ.</p>
    <h3>Vui lòng kiểm tra lại thao tác hoặc quay lại trang trước.</h3>
    <a class="btn-back" href="javascript:history.back()">Quay lại</a>
    <a class="btn-home" th:href="@{/}" href="/">Về trang chủ</a>
    <p class="brand"><a th:href="@{/}">SMART CINEMA</a> — Hệ thống đặt vé rạp chiếu phim</p>
  </div>
</body>

</html>
