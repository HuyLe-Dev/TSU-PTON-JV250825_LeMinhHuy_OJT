<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>403 - Không có quyền truy cập</title>
  <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
  <style>
    body {
      background: #0a0a0f;
      padding: 0;
      margin: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
    }

    .container img {
      max-width: 350px;
      width: 70%;
      filter: hue-rotate(40deg) saturate(1.2);
    }

    h1 {
      font-size: 3rem;
      color: #ff9800;
      font-weight: 900;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 1rem;
      color: #b3b3b3;
      font-weight: 400;
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto 24px;
    }

    .btn-home {
      display: inline-block;
      background: #ff9800;
      padding: 12px 32px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-home:hover {
      background: #ffb74d;
      transform: scale(1.03);
    }

    .btn-back {
      display: inline-block;
      background: transparent;
      border: 1px solid #555;
      padding: 12px 32px;
      color: #b3b3b3;
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      margin-left: 12px;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      border-color: #fff;
      color: #fff;
    }

    .brand {
      margin-top: 40px;
      color: #555;
      font-size: 0.85rem;
    }

    .brand a {
      color: #e50914;
      text-decoration: none;
      font-weight: 700;
    }

    @media screen and (max-width: 500px) {
      .container img {
        width: 60%;
      }

      h1 {
        font-size: 2.2rem;
      }

      .btn-back {
        margin-left: 0;
        margin-top: 12px;
        display: block;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="font-size: 6rem; margin-bottom: 16px;">🔒</div>
    <h1>403</h1>
    <h3>Bạn không có quyền truy cập trang này.<br>Vui lòng đăng nhập với tài khoản phù hợp.</h3>
    <a class="btn-home" th:href="@{/}" href="/">Về trang chủ</a>
    <a class="btn-back" href="javascript:history.back()">Quay lại</a>
    <p class="brand"><a th:href="@{/}">SMART CINEMA</a> — Hệ thống đặt vé rạp chiếu phim</p>
  </div>
</body>

</html>
