<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>404 - Không tìm thấy trang</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <style>
        body {
            background: #0a0a0f;
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        .container img {
            max-width: 400px;
            width: 80%;
        }

        h1 {
            font-size: 3rem;
            color: #e50914;
            font-weight: 900;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        h3 {
            font-size: 1rem;
            color: #b3b3b3;
            font-weight: 400;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 24px;
        }

        .btn-home {
            display: inline-block;
            background: #e50914;
            padding: 12px 32px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-home:hover {
            background: #ff1a25;
            transform: scale(1.03);
        }

        .brand {
            margin-top: 40px;
            color: #555;
            font-size: 0.85rem;
        }

        .brand a {
            color: #e50914;
            text-decoration: none;
            font-weight: 700;
        }

        @media screen and (max-width: 500px) {
            .container img {
                width: 70%;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img th:src="@{/images/404.svg}" src="../../static/images/404.svg" alt="404 Not Found">
        <h1>404</h1>
        <h3>Trang bạn tìm kiếm không tồn tại.<br>Có thể URL đã sai hoặc trang đã bị xóa.</h3>
        <a class="btn-home" th:href="@{/}" href="/">Về trang chủ</a>
        <p class="brand"><a th:href="@{/}">SMART CINEMA</a> — Hệ thống đặt vé rạp chiếu phim</p>
    </div>
</body>

</html>
