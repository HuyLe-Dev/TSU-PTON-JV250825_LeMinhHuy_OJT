<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Cinema - Trang chủ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" th:href="@{/}">SMART CINEMA</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link active" th:href="@{/}">Trang chủ</a>

        <!-- Hiển thị khi CHƯA đăng nhập -->
        <span sec:authorize="!isAuthenticated()">
          <a class="nav-link" th:href="@{/auth/login}">Đăng nhập</a>
          <a class="nav-link" th:href="@{/auth/register}">Đăng ký</a>
        </span>

        <!-- Hiển thị khi ĐÃ đăng nhập -->
        <span sec:authorize="isAuthenticated()">
          <a class="nav-link" th:href="@{/profile}">Hồ sơ</a>

          <!-- Link riêng cho từng role -->
          <a sec:authorize="hasRole('ADMIN')" class="nav-link text-info" th:href="@{/admin/dashboard}">Admin</a>
          <a sec:authorize="hasRole('STAFF')" class="nav-link text-info" th:href="@{/staff/dashboard}">Nhân viên</a>
          <a sec:authorize="hasRole('USER')" class="nav-link" th:href="@{/user/bookings}">Lịch sử vé</a>

          <a class="nav-link text-warning" th:href="@{/auth/logout}">Đăng xuất</a>
        </span>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="text-center">
      <h1>Chào mừng đến Smart Cinema</h1>
      <p class="lead text-muted">Hệ thống đặt vé rạp chiếu phim trực tuyến</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
