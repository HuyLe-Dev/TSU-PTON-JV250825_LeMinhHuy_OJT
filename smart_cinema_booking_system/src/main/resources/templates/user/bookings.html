<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đặt vé - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">SMART CINEMA</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}">Trang chủ</a>
                <a class="nav-link" th:href="@{/user/profile}">Hồ sơ</a>
                <a class="nav-link active" th:href="@{/user/bookings}">Lịch sử đặt vé</a>
                <a class="nav-link text-warning" th:href="@{/auth/logout}">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <h2 class="mb-4">Lịch sử đặt vé</h2>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Không có booking -->
        <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
            <p class="text-muted fs-5">Bạn chưa có đơn đặt vé nào.</p>
            <a th:href="@{/}" class="btn btn-primary">Khám phá phim ngay</a>
        </div>

        <!-- Danh sách booking -->
        <div th:each="b : ${bookings}" class="card mb-3 shadow-sm">
            <div class="card-body">
                <div class="row align-items-center">
                    <!-- Poster -->
                    <div class="col-md-2 text-center">
                        <img th:src="${b.posterUrl}" alt="Poster" class="img-fluid rounded"
                             style="max-height: 120px; object-fit: cover;"
                             th:unless="${b.posterUrl == null}">
                        <div th:if="${b.posterUrl == null}" class="bg-secondary rounded d-flex align-items-center justify-content-center"
                             style="height: 120px; width: 80px; margin: auto;">
                            <span class="text-white small">No Image</span>
                        </div>
                    </div>

                    <!-- Thông tin booking -->
                    <div class="col-md-7">
                        <h5 class="fw-bold mb-1" th:text="${b.movieTitle}">Tên phim</h5>
                        <p class="mb-1 text-muted">
                            <span th:text="${#temporals.format(b.showtimeStart, 'HH:mm - dd/MM/yyyy')}"></span>
                            | Phòng: <span th:text="${b.roomName}"></span>
                        </p>
                        <p class="mb-1">
                            Ghế: <span class="fw-bold" th:text="${b.seats}"></span>
                        </p>
                        <p class="mb-1">
                            Thanh toán:
                            <span th:if="${b.paymentMethod == 'PAYPAL'}" class="badge bg-warning text-dark">PayPal</span>
                            <span th:if="${b.paymentMethod == 'CASH'}" class="badge bg-secondary">Tiền mặt</span>
                            <span th:if="${b.paymentMethod == 'VNPAY'}" class="badge bg-info text-dark">VNPay</span>
                            <span th:if="${b.paymentMethod == 'MOMO'}" class="badge bg-danger">MoMo</span>
                        </p>
                        <p class="mb-0 small text-muted">
                            Đặt lúc: <span th:text="${#temporals.format(b.bookingDate, 'HH:mm dd/MM/yyyy')}"></span>
                        </p>
                    </div>

                    <!-- Status + Amount + Actions -->
                    <div class="col-md-3 text-end">
                        <!-- Status badge -->
                        <div class="mb-2">
                            <span th:if="${b.status.name() == 'PAID'}" class="badge bg-success fs-6">Đã thanh toán</span>
                            <span th:if="${b.status.name() == 'PENDING' && b.paymentMethod == 'PAYPAL'}" class="badge bg-warning text-dark fs-6">Chờ PayPal</span>
                            <span th:if="${b.status.name() == 'PENDING' && b.paymentMethod != 'PAYPAL'}" class="badge bg-info text-dark fs-6">Chờ xử lý</span>
                            <span th:if="${b.status.name() == 'CANCELLED'}" class="badge bg-secondary fs-6">Đã hủy</span>
                        </div>

                        <!-- Tổng tiền -->
                        <p class="fw-bold text-success fs-5 mb-2"
                           th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></p>

                        <!-- Nút hủy vé -->
                        <form th:if="${b.cancellable}" th:action="@{/user/bookings/{id}/cancel(id=${b.bookingId})}" method="post"
                              onsubmit="return confirm('Bạn chắc chắn muốn hủy vé này?');">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Hủy vé</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
