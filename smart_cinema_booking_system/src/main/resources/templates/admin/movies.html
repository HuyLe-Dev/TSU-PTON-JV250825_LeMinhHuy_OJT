<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Phim - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">SMART CINEMA - ADMIN</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" th:href="@{/admin/movies}">Quản lý Phim</a>
                <a class="nav-link" th:href="@{/admin/showtimes}">Quản lý Suất chiếu</a>
                <a class="nav-link text-warning" th:href="@{/auth/logout}">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Quản lý Phim</h2>
            <a th:href="@{/admin/movies/create}" class="btn btn-primary">+ Thêm Phim Mới</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Poster</th>
                    <th>Tên phim</th>
                    <th>Thời lượng</th>
                    <th>Trạng thái</th>
                    <th>Thể loại</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="movie : ${movies}">
                    <td th:text="${movie.movieId}">1</td>
                    <td>
                        <img th:if="${movie.posterUrl != null}" th:src="${movie.posterUrl}" alt="Poster" style="width: 50px; height: 70px; object-fit: cover;">
                        <span th:unless="${movie.posterUrl != null}" class="text-muted">No Image</span>
                    </td>
                    <td class="fw-bold" th:text="${movie.title}">Tên phim</td>
                    <td th:text="${movie.duration} + ' phút'">120 phút</td>
                    <td>
                        <span class="badge" th:classappend="${movie.status.name() == 'NOW_SHOWING'} ? 'bg-success' : 'bg-warning'" th:text="${movie.status}">Trạng thái</span>
                    </td>
                    <td>
                        <span th:each="g, iterStat : ${movie.genres}">
                            <span th:text="${g.genreName}"></span><span th:if="${!iterStat.last}">, </span>
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/admin/movies/edit/{id}(id=${movie.movieId})}" class="btn btn-sm btn-warning">Sửa</a>
                        <form th:action="@{/admin/movies/delete/{id}(id=${movie.movieId})}" method="post" class="d-inline form-confirm" data-message="Bạn có chắc muốn xóa phim này không?">
                            <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${movies == null or movies.isEmpty()}">
                    <td colspan="7" class="text-center text-muted">Chưa có phim nào trong hệ thống.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll('.form-confirm').forEach(form => {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const message = this.getAttribute('data-message');
                    Swal.fire({
                        title: 'Xác nhận',
                        text: message,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#d33',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Đồng ý',
                        cancelButtonText: 'Hủy'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            this.submit();
                        }
                    });
                });
            });
        });
    </script>
</body>

</html>
