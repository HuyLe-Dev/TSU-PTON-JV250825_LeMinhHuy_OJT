<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Suất chiếu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">SMART CINEMA - ADMIN</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/admin/movies}">Quản lý Phim</a>
                <a class="nav-link active" th:href="@{/admin/showtimes}">Quản lý Suất chiếu</a>
                <a class="nav-link text-warning" th:href="@{/auth/logout}">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Quản lý Suất Chiếu</h2>
            <a th:href="@{/admin/showtimes/create}" class="btn btn-primary">+ Thêm Suất Chiếu</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Poster</th>
                    <th>Phim</th>
                    <th>Phòng</th>
                    <th>Bắt đầu</th>
                    <th>Kết thúc (+15p dọn)</th>
                    <th>Giá vé (VNĐ)</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="st : ${showtimes}">
                    <td th:text="${st.showtimeId}">1</td>
                    <td>
                        <img th:if="${st.moviePosterUrl != null}" th:src="${st.moviePosterUrl}" alt="Poster" style="width: 50px; height: 70px; object-fit: cover;">
                        <span th:unless="${st.moviePosterUrl != null}" class="text-muted">No Image</span>
                    </td>
                    <td class="fw-bold" th:text="${st.movieTitle}">Tên phim</td>
                    <td th:text="${st.roomName}">Phòng</td>
                    <td class="text-primary fw-bold" th:text="${#temporals.format(st.startTime, 'dd/MM/yyyy HH:mm')}">Bắt đầu</td>
                    <td class="text-secondary" th:text="${#temporals.format(st.endTime, 'dd/MM/yyyy HH:mm')}">Kết thúc</td>
                    <td th:text="${#numbers.formatDecimal(st.ticketPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">Giá vé</td>
                    <td>
                        <span class="badge bg-info" th:text="${st.status}">Trạng thái</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/showtimes/delete/{id}(id=${st.showtimeId})}" method="post" class="form-confirm" data-message="Bạn có chắc muốn xóa suất chiếu này không?">
                            <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${showtimes == null or showtimes.isEmpty()}">
                    <td colspan="9" class="text-center text-muted">Chưa có suất chiếu nào.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll('.form-confirm').forEach(form => {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const message = this.getAttribute('data-message');
                    Swal.fire({
                        title: 'Xác nhận',
                        text: message,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#d33',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Đồng ý',
                        cancelButtonText: 'Hủy'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            this.submit();
                        }
                    });
                });
            });
        });
    </script>
</body>

</html>
