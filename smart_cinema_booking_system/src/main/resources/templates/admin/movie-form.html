<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa Phim - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">SMART CINEMA - ADMIN</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" th:href="@{/admin/movies}">Quản lý Phim</a>
                <a class="nav-link" th:href="@{/admin/showtimes}">Quản lý Suất chiếu</a>
                <a class="nav-link text-warning" th:href="@{/auth/logout}">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <h2 th:text="${movieId == null} ? 'Thêm Phim Mới' : 'Cập nhật Phim'">Thêm Phim Mới</h2>
        <hr>

        <form th:action="@{${movieId == null} ? '/admin/movies/create' : '/admin/movies/edit/' + ${movieId}}" 
              th:object="${movieDTO}" method="post" enctype="multipart/form-data">
            
            <!-- Hiển thị lỗi chung nếu có -->
            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                Vui lòng kiểm tra lại thông tin nhập!
            </div>

            <div class="row">
                <div class="col-md-8">
                    <div class="mb-3">
                        <label class="form-label">Tên phim (*)</label>
                        <input type="text" class="form-control" th:field="*{title}">
                        <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Thời lượng (Phút) (*)</label>
                            <input type="number" class="form-control" th:field="*{duration}">
                            <div class="text-danger" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngày phát hành (*)</label>
                            <input type="date" class="form-control" th:field="*{releaseDate}">
                            <div class="text-danger" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngôn ngữ</label>
                            <input type="text" class="form-control" th:field="*{language}" placeholder="VD: Tiếng Anh, Vietsub">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Giới hạn độ tuổi (*)</label>
                            <select class="form-select" th:field="*{ageRating}">
                                <option value="P">P (Mọi lứa tuổi)</option>
                                <option value="C13">C13 (Trên 13 tuổi)</option>
                                <option value="C16">C16 (Trên 16 tuổi)</option>
                                <option value="C18">C18 (Trên 18 tuổi)</option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('ageRating')}" th:errors="*{ageRating}"></div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Trạng thái (*)</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"></option>
                        </select>
                        <div class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Thể loại (*)</label>
                        <div class="border p-2 rounded" style="max-height: 150px; overflow-y: auto;">
                            <div th:each="genre : ${genres}" class="form-check">
                                <input class="form-check-input" type="checkbox" th:value="${genre.genreId}" th:field="*{genreIds}">
                                <label class="form-check-label" th:text="${genre.genreName}"></label>
                            </div>
                        </div>
                        <div class="text-danger" th:if="${#fields.hasErrors('genreIds')}" th:errors="*{genreIds}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Poster Phim (Tải ảnh lên)</label>
                        <input type="file" class="form-control" th:field="*{posterFile}" accept="image/*">
                        <small class="text-muted" th:if="${movieId != null}">Để trống nếu không muốn đổi ảnh mới.</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Trailer URL</label>
                        <input type="url" class="form-control" th:field="*{trailerUrl}" placeholder="Link Youtube">
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary px-4" th:text="${movieId == null} ? 'Thêm mới' : 'Lưu thay đổi'"></button>
                <a th:href="@{/admin/movies}" class="btn btn-secondary px-4 ms-2">Hủy</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
