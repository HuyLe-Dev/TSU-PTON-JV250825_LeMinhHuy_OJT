# ===== DEV PROFILE - H2 In-Memory Database =====
# Dùng khi không có MySQL. Chạy: ./gradlew bootRun

# Override datasource
spring.datasource.url=jdbc:h2:mem:smart_cinema_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Override Hibernate - phải override đúng key từ application.properties
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Tắt SQL script init
spring.sql.init.mode=never

# H2 Console - truy cập tại http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
